<!-- navbar.component.html -->
<header class="topbar" [class.scrolled]="isScrolled">
  <!-- Brand / Logo Section -->
  <div class="brand">
    <div class="logo-wrapper">
      <img src="assets/logo/sky-sat-lanka-logo.svg" alt="Sky Sat Lanka" class="logo-image" />
    </div>
    <div class="brand-text">
      <span class="company-name">Sky Sat Lanka</span>
      <span class="tagline">Satellite TV &amp; Accessories</span>
    </div>
  </div>

  <!-- Search Bar -->
  <div class="search-wrapper">
    <div class="searchbar">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
      </svg>
      <input type="search" placeholder="Search decoders, dishes, LNBs..." aria-label="Search products" />
    </div>
  </div>

  <!-- Navigation Links -->
  <nav class="links" aria-label="Primary navigation">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
    <a routerLink="/shop" routerLinkActive="active">Shop</a>
    <a routerLink="/tracking" routerLinkActive="active">Track Order</a>
  </nav>

  <!-- Action Buttons -->
  <div class="actions">
    <a class="cart" routerLink="/cart" routerLinkActive="active">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="9" cy="21" r="1" />
        <circle cx="20" cy="21" r="1" />
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
      </svg>
      Cart <span class="cart-badge">3</span>
    </a>
    <a class="auth-link" routerLink="/auth" routerLinkActive="active">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
        <circle cx="12" cy="7" r="4" />
      </svg>
      <span>Login</span>
    </a>
  </div>
</header>
