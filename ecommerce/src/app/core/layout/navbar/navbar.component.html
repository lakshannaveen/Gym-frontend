<!-- navbar.component.html -->
<header class="topbar" [class.scrolled]="isScrolled">
  <!-- Brand / Logo Section -->
  <div class="brand" routerLink="/">
    <div class="logo-wrapper">
      <!-- REMOVED width and height attributes since fill is used -->
      <img 
        ngSrc="images/logo.jpeg" 
        alt="Sky Sat Lanka" 
        class="logo-image"
        priority
        fill
      />
    </div>
    <div class="brand-text">
      <span class="company-name">Sky Sat Lanka</span>
      <span class="tagline">Satellite TV &amp; Accessories</span>
    </div>
  </div>

  <!-- Search Bar -->
  <div class="search-wrapper">
    <div class="searchbar">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
      </svg>
      <input type="search" placeholder="Search decoders, dishes..." aria-label="Search products" />
    </div>
  </div>

  <!-- Desktop Navigation Links -->
  <nav class="links desktop-links" aria-label="Primary navigation">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
    <a routerLink="/shop" routerLinkActive="active">Shop</a>
    <a routerLink="/tracking" routerLinkActive="active">Track Order</a>
  </nav>

  <!-- Action Buttons -->
  <div class="actions">
    <button type="button" class="cart" (click)="openCart()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="9" cy="21" r="1" />
        <circle cx="20" cy="21" r="1" />
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
      </svg>
      <span>Cart</span>
      <span class="cart-badge">{{ cart.itemCount() }}</span>
    </button>
    <a class="auth-link" routerLink="/auth" routerLinkActive="active">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
        <circle cx="12" cy="7" r="4" />
      </svg>
      <span>Login</span>
    </a>
    <!-- Mobile Menu Toggle -->
    <button class="menu-toggle" (click)="toggleMobileMenu()" aria-label="Toggle menu">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line *ngIf="!isMobileMenuOpen" x1="3" y1="6" x2="21" y2="6" />
        <line *ngIf="!isMobileMenuOpen" x1="3" y1="12" x2="21" y2="12" />
        <line *ngIf="!isMobileMenuOpen" x1="3" y1="18" x2="21" y2="18" />
        <line *ngIf="isMobileMenuOpen" x1="18" y1="6" x2="6" y2="18" />
        <line *ngIf="isMobileMenuOpen" x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
  </div>

  <!-- Mobile Navigation Menu -->
  <div class="mobile-menu" [class.open]="isMobileMenuOpen">
    <nav class="mobile-links">
      <!-- Home -->
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMobileMenu()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        Home
      </a>
      <!-- Shop -->
      <a routerLink="/shop" routerLinkActive="active" (click)="closeMobileMenu()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="7" width="20" height="14" rx="2" ry="2" />
          <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" />
        </svg>
        Shop
      </a>
      <!-- Track Order -->
      <a routerLink="/tracking" routerLinkActive="active" (click)="closeMobileMenu()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10" />
          <polyline points="12 6 12 12 16 14" />
        </svg>
        Track Order
      </a>
      <!-- Divider -->
      <div class="mobile-divider"></div>
      <!-- Cart -->
      <button type="button" class="mobile-cart" (click)="openCart()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="21" r="1" />
          <circle cx="20" cy="21" r="1" />
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
        </svg>
        Cart
        <span class="mobile-cart-badge">{{ cart.itemCount() }}</span>
      </button>
      <!-- Login -->
      <a routerLink="/auth" routerLinkActive="active" (click)="closeMobileMenu()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        Login / Register
      </a>
    </nav>
  </div>
</header>
