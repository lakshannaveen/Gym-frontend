<section class="auth-shell">
  <div class="auth-hero">
    <p class="eyebrow">Sky Sat Lanka account access</p>
    <h1>Sign in or create your account.</h1>
    <p>
      A client-ready authentication screen with clear separation between sign in and registration, styled in white, dark blue, and yellow.
    </p>
  </div>

  <div class="auth-panel">
    <div class="tabs">
      <button type="button" class="active">Sign In</button>
      <button type="button">Create Account</button>
    </div>

    <form class="form-grid">
      <div class="field-row">
        <label>
          First name
          <input type="text" placeholder="Kasun" />
        </label>
        <label>
          Last name
          <input type="text" placeholder="Perera" />
        </label>
      </div>
      <label>
        Email address
        <input type="email" placeholder="you@example.com" />
      </label>
      <label>
        Password
        <input type="password" placeholder="••••••••" />
      </label>
      <label>
        Confirm password
        <input type="password" placeholder="••••••••" />
      </label>
      <label>
        Phone number
        <input type="tel" placeholder="+94 7X XXX XXXX" />
      </label>

      <div class="actions">
        <button type="submit" class="primary">Create Account</button>
        <button type="button" class="secondary">Sign In</button>
      </div>
    </form>
  </div>
</section>
