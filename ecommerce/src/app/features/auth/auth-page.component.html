<!-- auth-page.component.html -->
<section class="auth-shell">
  <div class="auth-hero">
    <p class="eyebrow">Sky Sat Lanka</p>
    <h1>Welcome to Sky Sat Lanka</h1>
    <p>
      Your trusted source for satellite TV equipment and accessories in Sri Lanka.
    </p>
    <div class="hero-features">
      <div class="feature-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f5c542" stroke-width="2">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
          <polyline points="22 4 12 14.01 9 11.01" />
        </svg>
        <span>Quality Products</span>
      </div>
      <div class="feature-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f5c542" stroke-width="2">
          <rect x="2" y="7" width="20" height="14" rx="2" ry="2" />
          <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" />
        </svg>
        <span>Secure Shopping</span>
      </div>
      <div class="feature-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f5c542" stroke-width="2">
          <circle cx="12" cy="12" r="10" />
          <polyline points="12 6 12 12 16 14" />
        </svg>
        <span>Fast Delivery</span>
      </div>
    </div>
  </div>

  <div class="auth-panel">
    <div class="tabs">
      <button type="button" 
              [class.active]="activeTab === 'signin'" 
              (click)="setTab('signin')">Sign In</button>
      <button type="button" 
              [class.active]="activeTab === 'register'" 
              (click)="setTab('register')">Create Account</button>
    </div>

    <!-- SIGN IN FORM -->
    <form *ngIf="activeTab === 'signin'" [formGroup]="signInForm" (ngSubmit)="onSignIn()" class="form-grid">
      <label>
        Email address
        <input type="email" formControlName="email" placeholder="Enter email address" />
        <small class="error" *ngIf="signInForm.get('email')?.invalid && signInForm.get('email')?.touched">
          Please enter a valid email.
        </small>
      </label>
      <label>
        Password
        <input type="password" formControlName="password" placeholder="Enter password" />
        <small class="error" *ngIf="signInForm.get('password')?.invalid && signInForm.get('password')?.touched">
          Password is required.
        </small>
      </label>

      <div class="actions">
        <button type="submit" class="primary" [disabled]="signInForm.invalid">Sign In</button>
        <button type="button" class="secondary" (click)="setTab('register')">Create Account</button>
      </div>
    </form>

    <!-- REGISTER FORM -->
    <form *ngIf="activeTab === 'register'" [formGroup]="registerForm" (ngSubmit)="onRegister()" class="form-grid">
      <div class="field-row">
        <label>
          First name
          <input type="text" formControlName="firstName" placeholder="Enter first name" />
          <small class="error" *ngIf="registerForm.get('firstName')?.invalid && registerForm.get('firstName')?.touched">
            First name is required.
          </small>
        </label>
        <label>
          Last name
          <input type="text" formControlName="lastName" placeholder="Enter last name" />
          <small class="error" *ngIf="registerForm.get('lastName')?.invalid && registerForm.get('lastName')?.touched">
            Last name is required.
          </small>
        </label>
      </div>
      <label>
        Email address
        <input type="email" formControlName="email" placeholder="Enter email address" />
        <small class="error" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
          Please enter a valid email.
        </small>
      </label>
      <label>
        Password
        <input type="password" formControlName="password" placeholder="Enter password" />
        <small class="error" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
          Password must be at least 6 characters.
        </small>
      </label>
      <label>
        Confirm password
        <input type="password" formControlName="confirmPassword" placeholder="Confirm password" />
        <small class="error" *ngIf="registerForm.hasError('passwordMismatch') && registerForm.get('confirmPassword')?.touched">
          Passwords do not match.
        </small>
        <small class="error" *ngIf="registerForm.get('confirmPassword')?.invalid && registerForm.get('confirmPassword')?.touched && !registerForm.hasError('passwordMismatch')">
          Please confirm your password.
        </small>
      </label>
      <label>
        Phone number
        <input type="tel" formControlName="phone" placeholder="Enter phone number (e.g., 0774235919)" />
        <small class="error" *ngIf="registerForm.get('phone')?.invalid && registerForm.get('phone')?.touched">
          Please enter a valid Sri Lankan phone number (e.g., 0774235919).
        </small>
      </label>

      <!-- Terms and Conditions -->
      <label class="checkbox-label">
        <input type="checkbox" formControlName="agreeTerms" />
        <span>I agree to the <a href="#" class="terms-link">Terms and Conditions</a></span>
        <small class="error" *ngIf="registerForm.get('agreeTerms')?.invalid && registerForm.get('agreeTerms')?.touched">
          You must agree to the terms.
        </small>
      </label>

      <div class="actions">
        <button type="submit" class="primary" [disabled]="registerForm.invalid">Create Account</button>
        <button type="button" class="secondary" (click)="setTab('signin')">Sign In</button>
      </div>
    </form>
  </div>
</section>
